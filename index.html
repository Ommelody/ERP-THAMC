<helmet>
<title>ระบบ ERP ศูนย์การแพทย์ธรรมศาสตร์</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="erp-data.js"></script>

<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:#e9edec;font-family:'IBM Plex Sans Thai',system-ui,sans-serif;color:#182421;-webkit-font-smoothing:antialiased}
  a{color:#0d6e63}a:hover{color:#0a5a51}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#c4d0cd;border-radius:6px;border:2px solid #e9edec}
  ::-webkit-scrollbar-track{background:transparent}
  select,input,button,textarea{font-family:inherit}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes overlayIn{from{opacity:0}to{opacity:1}}
  @keyframes sheetIn{from{opacity:0;transform:translateY(16px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes drawerIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
  @keyframes growW{from{width:0}}
</style>
</helmet>
<div id="root" style="min-height:100vh">{{ app }}</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:1024}}">
class Component extends DCLogic {
  state = {
    ready:false, vw:0, role:'requester', page:null, drawer:false,
    sel:null, selType:null, roleMenu:false, toast:'',
    poTab:'all', poQ:'', poDept:'', poPage:0,
    payTab:'unpaid', payPage:0,
    regTab:'all', regQ:'',
    approveModal:null, brOverrides:{}, prOverrides:{}, prPO:{}, newPrs:[],
    brCreatedFlash:false, prCreatedFlash:false,
    poBindModal:null, poBindInput:'', poDocs:[],
    allocModal:null, itemProModal:null, itemProQ:'', itemProResult:null, allocCode:'',
    docModal:null, docType:null,
    trackQ:'', trackResult:null, scanModal:false,
    exportModal:null,
    br:[], pr:[], loaded:false, online:false, sapOnline:false, notifOpen:false
  };
  SUPA_URL='https://hkqyeeonfyzlbnimztuz.supabase.co';
  SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrcXllZW9uZnl6bGJuaW16dHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2ODU4NDMsImV4cCI6MjA5OTI2MTg0M30.Od-n8yNuIWu6Kx1Y_mW6Aemg3TRCxZG5ooTESpOgZBE';

  // ---------- palette ----------
  TEAL='#0d6e63'; TEALD='#0a5a51'; SIDE='#0f2e2a'; SIDE2='#17423b';
  INK='#182421'; MUTE='#657571'; FADE='#8c9a96'; LINE='#e3e9e7'; PANEL='#f5f8f7'; BG='#e9edec';
  GREEN='#2f8f6b'; GREENBG='#e6f4ee'; BLUE='#2f6fb0'; BLUEBG='#e7f0f8';
  AMBER='#b5810c'; AMBERBG='#faf0d6'; RED='#c34534'; REDBG='#fbe9e6'; PUR='#6a57a6'; PURBG='#ece9f6';

  componentDidMount(){
    this._winW=()=>window.innerWidth||document.documentElement.clientWidth||1280;
    this._onResize=()=>{clearTimeout(this._rt);this._rt=setTimeout(()=>{const w=this._winW();if(w!==this.state.vw)this.setState({vw:w});},120);};
    window.addEventListener('resize',this._onResize);
    window.__erp=this;
    const t=()=>{ if(window.ERPDATA){ this.D=window.ERPDATA; this.setState({ready:true,vw:this._winW(),page:this.roleHome('requester')}); this.loadDb(); } else setTimeout(t,60); };
    t();
  }
  componentWillUnmount(){ if(this._onResize) window.removeEventListener('resize',this._onResize); }

  // ---------- format ----------
  fmtN(n){ return Math.round(n||0).toLocaleString('en-US'); }
  fmtM(n){ n=n||0; const a=Math.abs(n); if(a>=1e6) return (n/1e6).toFixed(a>=1e7?1:2); if(a>=1e3) return (n/1e3).toFixed(0)+'K'; return this.fmtN(n); }
  unit(n){ return Math.abs(n||0)>=1e6?'ล้านบาท':'บาท'; }
  baht(n){ return '฿'+this.fmtN(n); }
  bahtM(n){ const a=Math.abs(n||0); return a>=1e6? '฿'+this.fmtM(n)+' ลบ.' : '฿'+this.fmtN(n); }
  dnum(s){ if(!s)return 0; const p=String(s).split('.'); if(p.length!==3)return 0; const[d,m,y]=p.map(Number); return (2000+y)*10000+m*100+d; }
  fdate(s){ if(!s)return '—'; const p=String(s).split('.'); if(p.length!==3)return s; const mo=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']; return p[0]+' '+mo[+p[1]]+' '+(43+ +p[2]); }
  rp(){ const vw=this.state.vw||1280; return { vw, isMobile:vw<720, isTablet:vw>=720&&vw<1080, narrow:vw<1080 }; }

  // ---------- roles ----------
  ROLES=[
    {k:'requester',label:'ผู้ขอซื้อ',sub:'หน่วยงาน',user:{name:'กมลวรรณ ศรีสุข',sub:'กลุ่มการพยาบาล · 13ORD',init:'กศ'}},
    {k:'budget',label:'งบประมาณ',sub:'พิจารณา/จัดสรร',user:{name:'ดร.วรพล งบดี',sub:'หัวหน้างานงบประมาณ',init:'วง'}},
    {k:'procurement',label:'พัสดุ / จัดซื้อ',sub:'จัดซื้อ',user:{name:'ธนกร พงษ์ไพบูลย์',sub:'เจ้าหน้าที่พัสดุ',init:'ธพ'}},
    {k:'finance',label:'การเงิน',sub:'จ่ายเงิน',user:{name:'สุภาพร เงินงาม',sub:'งานการเงิน',init:'สง'}},
    {k:'exec',label:'ผู้บริหาร',sub:'ภาพรวม',user:{name:'พญ.อรุณี วิสุทธิ์',sub:'ผู้อำนวยการ',init:'อว'}}
  ];
  role(){ return this.ROLES.find(r=>r.k===this.state.role); }
  roleHome(rk){ return {requester:'my-requests',budget:'br-approval',procurement:'pr-queue',finance:'pay-track',exec:'overview'}[rk]||'overview'; }

  NAV=[
    {zone:'งานของฉัน',items:[
      {key:'br-create',label:'ขออนุมัติงบประมาณ',icon:'＋',roles:['requester']},
      {key:'my-requests',label:'คำขอของฉัน',icon:'◷',roles:['requester']},
      {key:'br-approval',label:'พิจารณางบประมาณ',icon:'✓',roles:['budget'],badge:'brApprove'},
      {key:'br-allocate',label:'จัดสรรงบประมาณ',icon:'฿',roles:['budget'],badge:'brAllocate'},
      {key:'pr-queue',label:'คิวรับเรื่องซื้อ',icon:'☰',roles:['procurement'],badge:'prQueue'},
      {key:'po-verify',label:'ตรวจสอบเอกสารสั่งซื้อ',icon:'▤',roles:['procurement']}
    ]},
    {zone:'แดชบอร์ด',items:[
      {key:'overview',label:'ภาพรวมระบบ',icon:'◱',roles:['requester','budget','procurement','finance','exec']},
      {key:'dash-budget',label:'งบประมาณ',icon:'▦',roles:['budget','exec']},
      {key:'dash-procure',label:'การจัดซื้อ',icon:'⇄',roles:['procurement','exec']},
      {key:'dash-payment',label:'การจ่ายเงิน',icon:'◉',roles:['finance','exec']}
    ]},
    {zone:'ติดตาม & จัดการ',items:[
      {key:'tracking',label:'ติดตามสถานะ',icon:'◎',roles:['requester','budget','procurement','finance','exec']},
      {key:'pay-track',label:'ติดตามการจ่าย',icon:'⇲',roles:['finance','exec']},
      {key:'registry',label:'ทะเบียนเอกสาร',icon:'❐',roles:['procurement','budget','finance','exec']},
      {key:'reports',label:'รายงาน + Export SAP',icon:'⤓',roles:['procurement','budget','exec']}
    ]}
  ];
  navFor(){ const r=this.state.role; return this.NAV.map(z=>({zone:z.zone,items:z.items.filter(it=>it.roles.includes(r))})).filter(z=>z.items.length); }
  go(key){ this.setState({page:key,drawer:false,sel:null}); window.scrollTo&&window.scrollTo(0,0); }
  switchRole(rk){ this.setState({role:rk,roleMenu:false,drawer:false,sel:null,selType:null,page:this.roleHome(rk),poTab:'all',payTab:'unpaid',regTab:'all'}); }

  badgeCount(kind){ if(!this.D)return 0;
    if(kind==='brApprove') return this.brs().filter(b=>b.status==='รออนุมัติผู้บริหาร').length;
    if(kind==='brAllocate') return this.brs().filter(b=>['รอจัดสรรงบ','รอออกรหัสพัสดุ','รอเจ้าหน้าที่งบประมาณรับทราบ'].includes(b.status)).length;
    if(kind==='prQueue') return this.prs().filter(p=>p.status==='ยื่นเสนอซื้อ').length;
    return 0; }

  toastMsg(m){ this.setState({toast:m}); clearTimeout(this._tt); this._tt=setTimeout(()=>this.setState({toast:''}),3000); }

  // ---------- BR → PR unified lifecycle (ยึดตามระบบ PR ORDER เดิม) ----------
  // สถานะฝั่งงบประมาณ (BR) — จุดสีฟ้า ฿
  BRSTATE={
    'รออนุมัติผู้บริหาร':{c:'#2f6fb0',bg:'#e7f0f8',prog:1},
    'รอจัดสรรงบ':{c:'#6a57a6',bg:'#ece9f6',prog:2},
    'รอออกรหัสพัสดุ':{c:'#b5810c',bg:'#faf0d6',prog:2},
    'รอเจ้าหน้าที่งบประมาณรับทราบ':{c:'#b5810c',bg:'#faf0d6',prog:2},
    'จัดสรรงบแล้ว':{c:'#2f8f6b',bg:'#e6f4ee',prog:3},
    'ไม่อนุมัติ':{c:'#c34534',bg:'#fbe9e6',prog:1,reject:true} };
  // สถานะฝั่งจัดซื้อ (PR) — จุดสีเขียว
  PRSTATE={
    'ยื่นเสนอซื้อ':{c:'#6a57a6',bg:'#ece9f6',prog:4},
    'พัสดุรับเรื่อง':{c:'#b5810c',bg:'#faf0d6',prog:5},
    'กำลังดำเนินการจัดซื้อ':{c:'#b5810c',bg:'#faf0d6',prog:5},
    'ออกใบสั่งซื้อ':{c:'#2f6fb0',bg:'#e7f0f8',prog:6},
    'รับของแล้ว':{c:'#2f6fb0',bg:'#e7f0f8',prog:7},
    'ตั้งหนี้แล้ว':{c:'#0d6e63',bg:'#dcefea',prog:8},
    'จ่ายเงินแล้ว':{c:'#2f8f6b',bg:'#e6f4ee',prog:9},
    'ตีกลับ':{c:'#c34534',bg:'#fbe9e6',prog:4,reject:true} };
  // ไทม์ไลน์รวม BR→PR (9 ขั้น) — 3 ขั้นแรกฝั่งงบ ฿, 6 ขั้นหลังฝั่งจัดซื้อ
  FLOW=[
    {t:'ยื่นขออนุมัติงบ',ph:'br'},{t:'ผู้บริหารพิจารณา',ph:'br'},{t:'จัดสรรงบ + รหัสพัสดุ',ph:'br'},
    {t:'Copy to PR — ยื่นเสนอซื้อ',ph:'pr'},{t:'พัสดุรับเรื่อง',ph:'pr'},{t:'ออกใบสั่งซื้อ (PO)',ph:'pr'},
    {t:'รับของ (GR)',ph:'pr'},{t:'ตั้งหนี้ (A/P)',ph:'pr'},{t:'จ่ายเงิน',ph:'pr'} ];
  statusMap(rec){ return rec.kind==='br'? this.BRSTATE[rec.status] : this.PRSTATE[rec.status]; }

  // =========================================================
  renderVals(){
    if(!this.state.ready) return { app:this.loading() };
    const R=this.rp(); this.R=R;
    const content=this.page();
    return { app: this.shell(content) };
  }
  loading(){ const h=React.createElement;
    return h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',gap:16,color:this.MUTE}},
      h('div',{style:{width:40,height:40,borderRadius:'50%',border:'3px solid #d4dede',borderTopColor:this.TEAL,animation:'spin .8s linear infinite'}}),
      h('div',{style:{fontSize:14}},'กำลังโหลดข้อมูลระบบ ERP…')); }

  // ---------- shell ----------
  shell(content){
    const h=React.createElement; const R=this.R;
    if(R.isMobile) return h('div',{style:{minHeight:'100vh',background:this.BG}},
      this.topbar(), h('div',{style:{padding:'14px 13px 90px'}}, content),
      this.state.drawer? this.drawer():null, this.mobileNav(),
      this.state.sel? this.detailModal():null, this.state.approveModal? this.approveSheet():null,
      this.state.poBindModal? this.poBindSheet():null, this.extraModals(),
      this.state.roleMenu? this.roleSheet():null, this.state.notifOpen? this.notifPanel():null, this.state.toast? this.toastEl():null);
    return h('div',{style:{display:'flex',minHeight:'100vh',background:this.BG}},
      this.sidebar(),
      h('div',{style:{flex:1,minWidth:0,display:'flex',flexDirection:'column'}},
        this.topbar(),
        h('div',{style:{flex:1,padding:R.isTablet?'20px 22px 60px':'26px 34px 70px',maxWidth:1440,width:'100%',margin:'0 auto'}}, content)),
      this.state.sel? this.detailModal():null, this.state.approveModal? this.approveSheet():null,
      this.state.poBindModal? this.poBindSheet():null, this.extraModals(),
      this.state.roleMenu? this.roleSheet():null, this.state.notifOpen? this.notifPanel():null, this.state.toast? this.toastEl():null);
  }

  extraModals(){ const h=React.createElement;
    return h(React.Fragment,null,
      this.state.allocModal? this.allocSheet():null,
      this.state.itemProModal? this.itemProSheet():null,
      this.state.docModal? this.docModal2():null,
      this.state.scanModal? this.scanSheet():null,
      this.state.exportModal? this.exportSheet():null); }

  brand(dark){ const h=React.createElement;
    return h('div',{style:{display:'flex',alignItems:'center',gap:11}},
      h('div',{style:{width:38,height:38,borderRadius:11,background:dark?this.TEAL:this.TEAL,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:15,fontFamily:"'IBM Plex Mono',monospace",flexShrink:0,boxShadow:'0 2px 8px rgba(13,110,99,.35)'}},'TU'),
      h('div',{style:{minWidth:0}},
        h('div',{style:{color:dark?'#fff':this.INK,fontWeight:700,fontSize:14.5,lineHeight:1.15}},'ERP ศูนย์การแพทย์'),
        h('div',{style:{fontSize:10.5,color:dark?'#7fc9bb':this.MUTE,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:.3}},'THAMMASAT · SAP-LINKED')));
  }

  sidebar(){
    const h=React.createElement; const nav=this.navFor(); const role=this.role();
    return h('div',{style:{width:250,flexShrink:0,background:this.SIDE,color:'#c9ddd8',display:'flex',flexDirection:'column',position:'sticky',top:0,height:'100vh'}},
      h('div',{style:{padding:'20px 18px 18px',borderBottom:'1px solid rgba(255,255,255,.08)'}}, this.brand(true)),
      h('div',{style:{flex:1,overflowY:'auto',padding:'14px 12px'}},
        nav.map((z,zi)=> h('div',{key:zi,style:{marginBottom:18}},
          h('div',{style:{fontSize:10,fontWeight:600,letterSpacing:1.2,color:'#5f9088',textTransform:'uppercase',padding:'0 10px 8px'}},z.zone),
          z.items.map(it=>this.navItem(it))))),
      this.userChip(role));
  }
  navItem(it){ const h=React.createElement; const active=this.state.page===it.key; const bc=it.badge?this.badgeCount(it.badge):0;
    return h('div',{key:it.key,onClick:()=>this.go(it.key),
      style:{display:'flex',alignItems:'center',gap:12,padding:'10px 11px',borderRadius:10,cursor:'pointer',fontSize:13.5,marginBottom:2,
        background:active?this.TEAL:'transparent',color:active?'#fff':'#bcd3ce',fontWeight:active?600:400,transition:'background .15s'},
      onMouseEnter:e=>{if(!active)e.currentTarget.style.background='rgba(255,255,255,.06)';},
      onMouseLeave:e=>{if(!active)e.currentTarget.style.background='transparent';}},
      h('span',{style:{width:20,textAlign:'center',fontSize:15,opacity:active?1:.85}},it.icon),
      h('span',{style:{flex:1,minWidth:0,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},it.label),
      bc>0? h('span',{style:{background:active?'rgba(255,255,255,.25)':this.AMBER,color:'#fff',fontSize:10.5,fontWeight:600,padding:'1px 7px',borderRadius:10,fontFamily:"'IBM Plex Mono',monospace"}},bc):null);
  }
  userChip(role){ const h=React.createElement;
    return h('div',{onClick:()=>this.setState({roleMenu:true}),style:{margin:12,padding:'11px 12px',borderRadius:12,background:'rgba(255,255,255,.06)',display:'flex',alignItems:'center',gap:11,cursor:'pointer'}},
      h('div',{style:{width:36,height:36,borderRadius:'50%',background:'#8fd3c3',color:this.SIDE,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13,flexShrink:0}},role.user.init),
      h('div',{style:{minWidth:0,flex:1}},
        h('div',{style:{color:'#fff',fontSize:12.5,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},role.user.name),
        h('div',{style:{fontSize:10.5,color:'#7fc9bb',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},role.user.sub)),
      h('span',{style:{color:'#7fc9bb',fontSize:15}},'⇄'));
  }

  topbar(){
    const h=React.createElement; const R=this.R; const role=this.role(); const D=this.D;
    const title=this.pageTitle();
    if(R.isMobile) return h('div',{style:{position:'sticky',top:0,zIndex:30,background:'#fff',borderBottom:'1px solid '+this.LINE,padding:'calc(10px + env(safe-area-inset-top)) 14px 10px',display:'flex',alignItems:'center',gap:12}},
      h('button',{onClick:()=>this.setState({drawer:true}),style:{border:'1px solid '+this.LINE,background:'#fff',width:38,height:38,borderRadius:10,fontSize:17,color:this.INK,cursor:'pointer'}},'☰'),
      h('div',{style:{flex:1,minWidth:0}}, h('div',{style:{fontSize:15,fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},title.t)),
      this.notifBell(),
      h('div',{onClick:()=>this.setState({roleMenu:true}),style:{width:36,height:36,borderRadius:'50%',background:this.TEAL,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:600,fontSize:12.5,cursor:'pointer',flexShrink:0}},role.user.init));
    return h('div',{style:{position:'sticky',top:0,zIndex:30,background:'rgba(255,255,255,.9)',backdropFilter:'blur(10px)',borderBottom:'1px solid '+this.LINE,padding:'0 34px',height:64,display:'flex',alignItems:'center',gap:20}},
      h('div',{style:{flex:1,minWidth:0}},
        h('div',{style:{fontSize:19,fontWeight:700,letterSpacing:-.2,lineHeight:1.1}},title.t),
        title.s? h('div',{style:{fontSize:12,color:this.MUTE,marginTop:1}},title.s):null),
      h('div',{onClick:()=>{this.toastMsg('กำลังเชื่อมต่อฐานข้อมูล…');this.loadDb();},title:'สถานะฐานข้อมูล — คลิกเพื่อเชื่อมต่อใหม่',style:{display:'flex',alignItems:'center',gap:7,padding:'6px 12px',border:'1px solid '+(this.state.online?'#bfe3d6':this.LINE),borderRadius:22,background:this.state.online?this.GREENBG:'#fff',cursor:'pointer'}},
        h('span',{style:{width:8,height:8,borderRadius:'50%',background:this.state.online?this.GREEN:this.AMBER}}),
        h('span',{style:{fontSize:11.5,fontWeight:600,color:this.state.online?this.GREEN:this.AMBER}},this.state.online?'เชื่อมต่อ Supabase':'โหมดสาธิต')),
      h('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'5px 12px 5px 8px',border:'1px solid '+this.LINE,borderRadius:22,background:'#fff'}},
        h('span',{style:{fontSize:11,color:this.MUTE}},'ปีงบ'),
        h('span',{style:{fontSize:12.5,fontWeight:600,fontFamily:"'IBM Plex Mono',monospace",color:this.INK}},'2569')),
      this.notifBell(),
      h('div',{onClick:()=>this.setState({roleMenu:true}),style:{display:'flex',alignItems:'center',gap:10,cursor:'pointer',padding:'5px 6px 5px 14px',borderRadius:26,border:'1px solid '+this.LINE,background:'#fff'}},
        h('div',{style:{textAlign:'right'}},

  async loadDb(){
    const sb=this.initDb();
    const fallback=()=>{ this.setState({br:this.D.brs.map(b=>Object.assign({kind:'br'},b)), pr:this.D.prs.map(p=>Object.assign({kind:'pr'},p)), loaded:true, online:false}); };

    try{
      let br=(await sb.from('budget_requests').select('*').order('created_at')).data;
      let pr=(await sb.from('purchase_requests').select('*').order('created_at')).data;
      if(br===null||pr===null) throw new Error('no table');
      if(br.length===0){ await sb.from('budget_requests').insert(this.D.brs.map(b=>this.brToDb(b))); await sb.from('purchase_requests').insert(this.D.prs.map(p=>this.prToDb(p)));
        br=(await sb.from('budget_requests').select('*').order('created_at')).data; pr=(await sb.from('purchase_requests').select('*').order('created_at')).data; this.toastMsg('เชื่อมต่อ Supabase — เพิ่มข้อมูลตัวอย่างเริ่มต้นแล้ว'); }
      else { this.toastMsg('เชื่อมต่อฐานข้อมูล Supabase สำเร็จ'); }
      this.setState({br:(br||[]).map(x=>this.brFromDb(x)), pr:(pr||[]).map(x=>this.prFromDb(x)), loaded:true, online:true});
      this.loadSap(sb);
    }catch(err){ console.warn('supabase load failed',err); this.toastMsg('ยังไม่ได้สร้างตารางใน Supabase — ใช้โหมดสาธิตชั่วคราว'); fallback(); }

    return out; }
