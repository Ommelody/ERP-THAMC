class Component extends DCLogic {
  state = {

    sel:null, selType:null, roleMenu:false, toast:'',
    poTab:'all', poQ:'', poDept:'', poPage:0,
    payTab:'unpaid', payPage:0,
    regTab:'all', regQ:'', reqView:'list', reqQ:'', reqFilter:'all', rptType:'br', rptFrom:'', rptTo:'',
    approveModal:null, brOverrides:{}, prOverrides:{}, prPO:{}, newPrs:[],
    brCreatedFlash:false, prCreatedFlash:false,
    poBindModal:null, poBindInput:'', poDocs:[],
    allocModal:null, itemProModal:null, itemProQ:'', itemProResult:null, allocCode:'', ackModal:null,
    itemMasterResults:null, itemMasterErr:false,
    docModal:null, docType:null,
    trackQ:'', trackResult:null, scanModal:false,
    exportModal:null,
    br:[], pr:[], loaded:false, online:false, sapOnline:false, notifOpen:false,
    authed:false, loginU:'', loginP:'', loginErr:'', prDraft:null,
    icrRows:[], icrInput:{}, users:[], userForm:{username:'',password:'',name:'',role:'requester'}, brDraft:null, confirm:null,
    canInstall:false, notifBefore:{lo:7,hi:30}, uploads:{}, curFy:null, editUser:null
  };
  // ---------- ปีงบประมาณราชการ (เริ่ม 1 ต.ค. / พ.ศ.) ----------
  fyOfDate(d){ if(!d) return null; const by=d.getFullYear()+543; return d.getMonth()>=9? by+1 : by; }
  fyNow(){ return this.fyOfDate(new Date()); }
  fyOfThai(s){ const d=this.parseThai(s); return d? this.fyOfDate(d) : null; }
  curFy(){ return this.state.curFy || this.fyNow(); }
  fyList(){ const set={}; (this.state.br||[]).forEach(b=>{ const f=b.fy||this.fyOfThai(b.at); if(f)set[f]=1; });
    (this.state.pr||[]).forEach(p=>{ const f=p.fy||this.fyOfThai(p.at); if(f)set[f]=1; });
    ((this.D&&this.D.budgetSap&&this.D.budgetSap.codes)||[]).forEach(c=>{ if(c.fy)set[c.fy]=1; });
    set[this.fyNow()]=1; return Object.keys(set).map(Number).sort((a,b)=>b-a); }
  inFy(rec){ const f=rec.fy||this.fyOfThai(rec.at); return f==null || f===this.curFy(); }
  SUPA_URL='https://hkqyeeonfyzlbnimztuz.supabase.co';  SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrcXllZW9uZnl6bGJuaW16dHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2ODU4NDMsImV4cCI6MjA5OTI2MTg0M30.Od-n8yNuIWu6Kx1Y_mW6Aemg3TRCxZG5ooTESpOgZBE';
  ITEMPRO_API='';  // (ตัวเลือก) URL ปลายทาง REST ของโปรแกรม Item Master Pro เช่น https://itempro.example/api/code-request — เว้นว่างได้ ระบบจะใช้ตาราง item_code_requests บน Supabase เป็นช่องทาง
  ITEMPRO_KEY='';  // (ตัวเลือก) API key/token สำหรับ Item Pro

  // ---------- palette ----------
  TEAL='#0d6e63'; TEALD='#0a5a51'; SIDE='#0f2e2a'; SIDE2='#17423b';
  INK='#182421'; MUTE='#657571'; FADE='#8c9a96'; LINE='#e3e9e7'; PANEL='#f5f8f7'; BG='#e9edec';
  GREEN='#2f8f6b'; GREENBG='#e6f4ee'; BLUE='#2f6fb0'; BLUEBG='#e7f0f8';
  AMBER='#b5810c'; AMBERBG='#faf0d6'; RED='#c34534'; REDBG='#fbe9e6'; PUR='#6a57a6'; PURBG='#ece9f6';

  componentDidMount(){
    this._winW=()=>window.innerWidth||document.documentElement.clientWidth||1280;
    this._onResize=()=>{clearTimeout(this._rt);this._rt=setTimeout(()=>{const w=this._winW();if(w!==this.state.vw)this.setState({vw:w});},120);};
    window.addEventListener('resize',this._onResize);
    window.__erp=this;
    try{ if('serviceWorker' in navigator){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>0); }); }
      window.addEventListener('beforeinstallprompt',(e)=>{ e.preventDefault(); this._deferredPrompt=e; this.setState({canInstall:true}); });
      window.addEventListener('appinstalled',()=>{ this._deferredPrompt=null; this.setState({canInstall:false}); this.toastMsg&&this.toastMsg('ติดตั้งแอปสำเร็จ'); });
    }catch(e){}
    const t=()=>{ if(window.ERPDATA){ this.D=window.ERPDATA; this.D.po=[]; this.D.ap=[]; this.D.pay=[]; this.loadSapLocal(); this.loadExps(); this.setState({ready:true,vw:this._winW(),page:this.roleHome('requester'),uploads:this._restoredUploads||{},curFy:this.fyNow()}); this.loadDb(); } else setTimeout(t,60); };
    t();
  }
  saveSapLocal(){ /* เลิกเก็บ localStorage — ข้อมูล SAP บันทึกลง Supabase ผ่าน persistSap เท่านั้น */ }
  loadSapLocal(){ /* เลิกอ่าน cache ในเครื่อง — โหลด SAP จาก Supabase ผ่าน loadSap() แทน */ }
  saveExps(){ const sb=this.initDb(); if(sb&&this.state.online){ /* ประเภทพัสดุเก็บใน app_config บน Supabase */ sb.from('app_config').upsert({k:'exps',v:this.D.exps||[]},{onConflict:'k'}).then(r=>{if(r&&r.error)console.warn(r.error);}); } }
  async loadExps(){ const sb=this.initDb(); if(sb&&this.state.online){ try{ const r=await sb.from('app_config').select('v').eq('k','exps').single(); if(r&&!r.error&&r.data&&Array.isArray(r.data.v)&&r.data.v.length){ this.D.exps=r.data.v; this.forceUpdate&&this.forceUpdate(); } }catch(e){} } }
  addExp(){ const v=(this.state.newExp||'').trim(); if(!v){ this.toastMsg('กรุณากรอกชื่อประเภทพัสดุ'); return; }
    if((this.D.exps||[]).includes(v)){ this.toastMsg('มีประเภทนี้อยู่แล้ว'); return; }
    this.D.exps=(this.D.exps||[]).concat([v]); this.saveExps(); this.setState({newExp:''}); this.toastMsg('เพิ่มประเภทพัสดุ "'+v+'" แล้ว'); }
  delExp(x){ this.D.exps=(this.D.exps||[]).filter(e=>e!==x); this.saveExps(); this.forceUpdate(); this.toastMsg('ลบประเภทพัสดุ "'+x+'" แล้ว'); }
  componentWillUnmount(){ this.stopScan(); if(this._onResize) window.removeEventListener('resize',this._onResize); if(this._ipPoll) clearInterval(this._ipPoll); if(this._rtSub){ try{ this._rtSub.unsubscribe(); }catch(e){} } }

  // ---------- format ----------
  fmtN(n){ return Math.round(n||0).toLocaleString('en-US'); }
  fmtM(n){ n=n||0; const a=Math.abs(n); if(a>=1e6) return (n/1e6).toFixed(a>=1e7?1:2); if(a>=1e3) return (n/1e3).toFixed(0)+'K'; return this.fmtN(n); }
  unit(n){ return Math.abs(n||0)>=1e6?'ล้านบาท':'บาท'; }
  baht(n){ return '฿'+this.fmtN(n); }
  bahtM(n){ const a=Math.abs(n||0); return a>=1e6? '฿'+this.fmtM(n)+' ลบ.' : '฿'+this.fmtN(n); }
  dnum(s){ if(!s)return 0; const p=String(s).split('.'); if(p.length!==3)return 0; const[d,m,y]=p.map(Number); return (2000+y)*10000+m*100+d; }
  fdate(s){ if(!s)return '—'; const p=String(s).split('.'); if(p.length!==3)return s; const mo=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']; return p[0]+' '+mo[+p[1]]+' '+(43+ +p[2]); }
  rp(){ const vw=this.state.vw||1280; return { vw, isMobile:vw<720, isTablet:vw>=720&&vw<1080, narrow:vw<1080 }; }

  // ---------- roles ----------
  ROLES=[
    {k:'admin',label:'ผู้ดูแลระบบ',sub:'Admin',user:{name:'ผู้ดูแลระบบ (Admin)',sub:'สิทธิ์เต็มระบบ',init:'AD'}},
    {k:'requester',label:'ผู้ขอซื้อ',sub:'หน่วยงาน',user:{name:'กมลวรรณ ศรีสุข',sub:'กลุ่มการพยาบาล · 13ORD',init:'กศ'}},
    {k:'budget',label:'งบประมาณ',sub:'จัดสรรงบ',user:{name:'ดร.วรพล งบดี',sub:'หัวหน้างานงบประมาณ',init:'วง'}},
    {k:'procurement',label:'พัสดุ / จัดซื้อ',sub:'จัดซื้อ',user:{name:'ธนกร พงษ์ไพบูลย์',sub:'เจ้าหน้าที่พัสดุ',init:'ธพ'}},
    {k:'finance',label:'การเงิน',sub:'จ่ายเงิน',user:{name:'สุภาพร เงินงาม',sub:'งานการเงิน',init:'สง'}},
    {k:'exec',label:'ผู้บริหาร',sub:'อนุมัติ/ภาพรวม',user:{name:'พญ.อรุณี วิสุทธิ์',sub:'ผู้อำนวยการ',init:'อว'}}
  ];
  role(){ const base=this.ROLES.find(r=>r.k===this.state.role); if(!base) return base;
    // โหมด Auth จริง: แทนที่ชื่อ/หน่วยงาน/อักษรย่อ ด้วยข้อมูลผู้ใช้ที่ล็อกอินจริง (ไม่ใช้บทบาทสมมุติ)
    if(this._authName){ const pf=this._authProfile||{}; const name=this._authName;
      const sub=[pf.dept_name,pf.dept].filter(Boolean).join(' · ')||pf.pos||base.user.sub;
      const init=(name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join(''))||base.user.init;
      return Object.assign({},base,{user:Object.assign({},base.user,{name,sub,init})}); }
    return base; }
  roleHome(rk){ return {admin:'overview',requester:'my-requests',budget:'br-allocate',procurement:'pr-queue',finance:'pay-track',exec:'br-approval'}[rk]||'overview'; }

  NAV=[
    {zone:'งานของฉัน',items:[
      {key:'br-create',label:'ขออนุมัติจัดสรรงบ',icon:'＋',roles:['requester']},
      {key:'my-requests',label:'คำขอของฉัน',icon:'◷',roles:['requester']},
      {key:'pr-create',label:'สร้างใบขอซื้อ',icon:'▤',roles:['requester']},
      {key:'br-approval',label:'อนุมัติจัดสรรงบ',icon:'✓',roles:['exec','budget'],badge:'brApprove'},
      {key:'br-allocate',label:'จัดสรรงบประมาณ',icon:'฿',roles:['budget'],badge:'brAllocate'},
      {key:'item-pro',label:'เชื่อมต่อ Item Pro',icon:'⇄',roles:['budget']},
      {key:'pr-queue',label:'คิวรับเรื่องซื้อ',icon:'☰',roles:['procurement'],badge:'prQueue'},
      {key:'po-verify',label:'ตรวจสอบเอกสารสั่งซื้อ',icon:'▤',roles:['procurement']}
    ]},
    {zone:'แดชบอร์ด',items:[
      {key:'overview',label:'ภาพรวมระบบ',icon:'◱',roles:['requester','budget','procurement','finance','exec']},
      {key:'dash-budget',label:'งบประมาณ',icon:'▦',roles:['budget','procurement','finance','exec']},
      {key:'dash-procure',label:'จัดซื้อทั้งกระบวนการ',icon:'⇄',roles:['budget','procurement','finance','exec']},
      {key:'dash-cost',label:'วิเคราะห์ต้นทุน',icon:'◔',roles:['budget','procurement','finance','exec']},
      {key:'dash-payment',label:'การจ่ายเงิน',icon:'◉',roles:['budget','procurement','finance','exec']}
    ]},
    {zone:'ติดตาม & จัดการ',items:[
      {key:'tracking',label:'ติดตามสถานะ',icon:'◎',roles:['requester','budget','procurement','finance','exec']},
      {key:'pay-track',label:'ติดตามการจ่าย',icon:'⇲',roles:['finance','exec']},
      {key:'registry',label:'ทะเบียนเอกสาร',icon:'❐',roles:['procurement','budget','finance','exec']},
      {key:'reports',label:'รายงาน + Export SAP',icon:'⤓',roles:['procurement','budget','exec']}
    ]},
    {zone:'ตั้งค่า & ข้อมูล',items:[
      {key:'data-sync',label:'นำเข้าข้อมูล SAP',icon:'⤒',roles:['procurement','budget','finance','exec']},
      {key:'flowchart',label:'ผังกระบวนการ',icon:'⧉',roles:['admin']},
      {key:'settings',label:'ตั้งค่าระบบ',icon:'⚙',roles:['admin','exec']}
    ]}
  ];
  navFor(){ const r=this.state.role; return this.NAV.map(z=>({zone:z.zone,items:z.items.filter(it=>r==='admin'||it.roles.includes(r))})).filter(z=>z.items.length); }
  go(key){ if(key==='br-create'&&!this.state.brDraft) this.setState({brDraft:this.newBrDraft()}); this.setState({page:key,drawer:false,sel:null}); if(key==='item-pro') this.loadIcr(); if(key==='settings'||key==='admin-users') this.loadUsers(); window.scrollTo&&window.scrollTo(0,0); }
  switchRole(rk){ this.setState({role:rk,roleMenu:false,drawer:false,sel:null,selType:null,page:this.roleHome(rk),poTab:'all',payTab:'unpaid',regTab:'all'}); }

  badgeCount(kind){ if(!this.D)return 0;
    if(kind==='brApprove') return this.brs().filter(b=>b.status==='รออนุมัติผู้บริหาร').length;
    if(kind==='brAllocate') return this.brs().filter(b=>['รอจัดสรรงบ','รอออกรหัสพัสดุ','รอเจ้าหน้าที่งบประมาณรับทราบ'].includes(b.status)).length;
    if(kind==='prQueue') return this.prs().filter(p=>p.status==='ยื่นเสนอซื้อ').length;
    return 0; }

  toastMsg(m){ this.setState({toast:m}); clearTimeout(this._tt); this._tt=setTimeout(()=>this.setState({toast:''}),3000); }

  // ---------- BR → PR unified lifecycle (ยึดตามระบบ PR ORDER เดิม) ----------
  // สถานะฝั่งงบประมาณ (BR) — จุดสีฟ้า ฿
  BRSTATE={
    'รออนุมัติผู้บริหาร':{c:'#2f6fb0',bg:'#e7f0f8',prog:1},
    'รอจัดสรรงบ':{c:'#6a57a6',bg:'#ece9f6',prog:2},
    'รอออกรหัสพัสดุ':{c:'#b5810c',bg:'#faf0d6',prog:2},
    'รอเจ้าหน้าที่งบประมาณรับทราบ':{c:'#b5810c',bg:'#faf0d6',prog:2},
    'จัดสรรงบแล้ว':{c:'#2f8f6b',bg:'#e6f4ee',prog:3},
    'ส่งกลับแก้ไข':{c:'#b5810c',bg:'#faf0d6',prog:1,revise:true},
    'ไม่อนุมัติ':{c:'#c34534',bg:'#fbe9e6',prog:1,reject:true} };
  // สถานะฝั่งจัดซื้อ (PR) — จุดสีเขียว
  PRSTATE={
    'ส่งกลับแก้ไข (PR)':{c:'#b5810c',bg:'#faf0d6',prog:4,reject:true},
    'ยื่นเสนอซื้อ':{c:'#6a57a6',bg:'#ece9f6',prog:4},
    'พัสดุรับเรื่อง':{c:'#b5810c',bg:'#faf0d6',prog:5},
    'กำลังดำเนินการจัดซื้อ':{c:'#b5810c',bg:'#faf0d6',prog:5},
    'ออกใบสั่งซื้อ':{c:'#2f6fb0',bg:'#e7f0f8',prog:6},
    'รับของแล้ว':{c:'#2f6fb0',bg:'#e7f0f8',prog:7},
    'ตั้งหนี้แล้ว':{c:'#0d6e63',bg:'#dcefea',prog:8},
    'จ่ายเงินแล้ว':{c:'#2f8f6b',bg:'#e6f4ee',prog:9},
    'ตีกลับ':{c:'#c34534',bg:'#fbe9e6',prog:4,reject:true} };
  // ไทม์ไลน์รวม BR→PR (9 ขั้น) — 3 ขั้นแรกฝั่งงบ ฿, 6 ขั้นหลังฝั่งจัดซื้อ
  FLOW=[
    {t:'ยื่นขออนุมัติงบ',ph:'br'},{t:'ผู้บริหารพิจารณา',ph:'br'},{t:'จัดสรรงบ + รหัสพัสดุ',ph:'br'},
    {t:'Copy to PR — ยื่นเสนอซื้อ',ph:'pr'},{t:'พัสดุรับเรื่อง',ph:'pr'},{t:'ออกใบสั่งซื้อ (PO)',ph:'pr'},
    {t:'รับของ (GR)',ph:'pr'},{t:'ตั้งหนี้ (A/P)',ph:'pr'},{t:'จ่ายเงิน',ph:'pr'} ];
  statusMap(rec){ return rec.kind==='br'? this.BRSTATE[rec.status] : this.PRSTATE[rec.status]; }

  // =========================================================
  renderVals(){
    if(!this.state.ready) return { app:this.loading() };
    const R=this.rp(); this.R=R;
    if(!this.state.authed) return { app:this.loginScreen() };
    const content=this.page();
    return { app: this.shell(content) };
  }
  loading(){ const h=React.createElement;
    return h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',gap:16,color:this.MUTE}},
      h('div',{style:{width:40,height:40,borderRadius:'50%',border:'3px solid #d4dede',borderTopColor:this.TEAL,animation:'spin .8s linear infinite'}}),
      h('div',{style:{fontSize:14}},'กำลังโหลดข้อมูลระบบ ERP…')); }

  // ---------- auth ----------
  ACCOUNTS=[{u:'Admin',p:'Admin',role:'admin'},{u:'requester',p:'1234',role:'requester'},{u:'budget',p:'1234',role:'budget'},{u:'procure',p:'1234',role:'procurement'},{u:'finance',p:'1234',role:'finance'},{u:'exec',p:'1234',role:'exec'}];
  // ออกเลขที่เอกสารแบบ atomic ผ่าน RPC (กันเลขซ้ำเมื่อหลายคนสร้างพร้อมกัน) — fallback เป็นตัวนับในเครื่องเมื่อ offline
  async genDocId(kind){ const sb=this._sb; const ym=this.ymCode();

  async loadDb(){
    const sb=this.initDb();
    const fallback=()=>{ this.setState({br:[], pr:[], loaded:true, online:false, users:this.defaultUsers()}); };
    if(!sb){ fallback(); return; }
    try{
      let br=(await sb.from('budget_requests').select('*').order('created_at')).data;
      let pr=(await sb.from('purchase_requests').select('*').order('created_at')).data;
      if(br===null||pr===null) throw new Error('no table');
      this.toastMsg('เชื่อมต่อฐานข้อมูล Supabase สำเร็จ — พร้อมคีย์ข้อมูลจริง');
      this.setState({br:(br||[]).map(x=>this.brFromDb(x)), pr:(pr||[]).map(x=>this.prFromDb(x)), loaded:true, online:true});
      this.loadUsers(sb);
      this.loadExps();
      this.loadSap(sb);
      this.syncItemPro(); this.startItemProPoll(); this.searchItemMaster(''); this.subscribeRealtime(sb);
    }catch(err){ console.warn('supabase load failed',err); this.toastMsg('ยังไม่ได้สร้างตารางใน Supabase — ใช้โหมดสาธิตชั่วคราว'); fallback(); }
  }
  // เชื่อม Supabase Realtime — Item Pro V2 เขียน item_master / ออกรหัสใน item_code_requests แล้วเข้าระบบทันที (ไม่ต้องรอ poll)
  subscribeRealtime(sb){ if(this._rtSub||!sb||!sb.channel) return;
    try{ this._rtSub=sb.channel('erp-itempro')
      .on('postgres_changes',{event:'*',schema:'public',table:'item_code_requests'},()=>{ this.syncItemPro(true); })
      .on('postgres_changes',{event:'*',schema:'public',table:'item_master'},()=>{ if(this.state.itemProModal) this.searchItemMaster(this.state.itemProQ||''); })
      .subscribe();
    }catch(e){ console.warn('realtime subscribe failed',e); }
  }
  // ดึงรหัสที่ Item Pro ออกให้แล้ว (status=issued) กลับเข้าระบบอัตโนมัติ — แก้ปัญหา "ส่งกลับมาแล้วเงียบ"
  async syncItemPro(silent){ const sb=this._sb; if(!sb||!this.state.online) return;
    try{ const r=await sb.from('item_code_requests').select('*').eq('status','issued'); if(r.error||!r.data) return;
      let applied=0;
      r.data.forEach(row=>{ if(!row.code||!row.br_id) return; const b=this.brById(row.br_id);
        if(b && b.status==='รอออกรหัสพัสดุ'){ this.brReceiveCode(b.id,row.code); applied++; } });
      if(applied>0) this.toastMsg('รับรหัสจาก Item Pro '+applied+' รายการ — เดินขั้นตอนต่อแล้ว');
      else if(!silent) this.toastMsg('ยังไม่มีรหัสใหม่จาก Item Pro');
    }catch(e){ console.warn('syncItemPro',e); }
  }
  startItemProPoll(){ if(this._ipPoll) return; this._ipPoll=setInterval(()=>{ if(this.state.online) this.syncItemPro(true); }, 20000); }
  // ค้นหารหัสพัสดุแบบ live จากฐานข้อมูลกลาง item_master (Item Master Pro V2 เขียนลง Supabase)
  searchItemMaster(q){ clearTimeout(this._imT); const term=(q||'').trim();
    this._imT=setTimeout(async ()=>{ const sb=this._sb;
      if(!sb||!this.state.online){ this.setState({itemMasterResults:null,itemMasterErr:false}); return; }
      try{ let query=sb.from('item_master').select('code,name,category,unit').limit(40);
        if(term){ const esc=term.replace(/[%,]/g,' '); query=query.or('name.ilike.%'+esc+'%,code.ilike.%'+esc+'%,category.ilike.%'+esc+'%'); }
        const r=await query;
        if(r.error){ this.setState({itemMasterResults:null,itemMasterErr:true}); return; }
        this.setState({itemMasterResults:r.data||[],itemMasterErr:false});
      }catch(e){ this.setState({itemMasterResults:null,itemMasterErr:true}); }
    },220); }
  async fetchAll(sb,table){ let out=[],from=0,step=1000;
    while(true){ const r=await sb.from(table).select('*').range(from,from+step-1); if(r.error){ return from===0?null:out; } const rows=r.data||[]; out=out.concat(rows); if(rows.length<step) break; from+=step; }
    return out; }
  async loadSap(sb){
    try{
      const po=await this.fetchAll(sb,'sap_po'); if(po===null) return; // tables not seeded yet
      const ap=await this.fetchAll(sb,'sap_ap'); const pay=await this.fetchAll(sb,'sap_payment');
      if(po&&po.length){ this.D.po=po.map(r=>({doc:r.doc,pf:r.pf,post:r.post,deliv:r.deliv,vn:r.vn,vc:r.vc,dept:r.dept,dn:r.dn,who:r.who,val:+r.val,qty:+r.qty,open:+r.open,ln:+r.ln,tr:r.tr,gd:+r.gd,ap:+r.ap,paid:+r.paid,od:+r.od,odDays:+r.od_days,exp:r.exp,plan:r.plan,fy:r.fy,grl:r.grl||[]})); }
      if(ap&&ap.length){ this.D.ap=ap.map(r=>({doc:r.doc,post:r.post,vn:r.vn,vc:r.vc,dept:r.dept,dn:r.dn,val:+r.val,paid:r.paid,payDate:r.pay_date,payDoc:r.pay_doc,method:r.method,base:r.base,exp:r.exp,plan:r.plan})); }
      if(pay&&pay.length){ this.D.pay=pay.map(r=>({doc:r.doc,series:r.series,post:r.post,due:r.due,vn:r.vn,vc:r.vc,total:+r.total,method:r.method,invCount:+r.inv_count,purpose:r.purpose})); }
      const bud=await this.fetchAll(sb,'sap_budget');
      if(bud&&bud.length){ const codes=bud.map(r=>({exp:r.exp,fy:r.fy?Number(r.fy):null,name:r.name,plan:r.plan,sub:r.sub,current:+r.current,commit:+r.commit,actual:+r.actual,avail:+r.avail,dept:r.dept,deptCode:r.dept_code}));
        const tot=codes.reduce((a,c)=>({current:a.current+c.current,commit:a.commit+c.commit,actual:a.actual+c.actual,avail:a.avail+c.avail}),{current:0,commit:0,actual:0,avail:0});
        this.D.budgetSap={generated:this.D.meta.today,codes,totals:tot}; }
      this.setState({sapOnline:!!(po&&po.length)}); if(po&&po.length) this.toastMsg('โหลดข้อมูล SAP จากฐานข้อมูลแล้ว ('+po.length+' PO · '+((ap&&ap.length)||0)+' ตั้งหนี้ · '+((pay&&pay.length)||0)+' จ่าย)');
    }catch(e){ console.warn('sap load',e); }
  }
  persistBr(nb){ this.setState(s=>({br:s.br.map(b=>b.id===nb.id?nb:b)})); this._save('budget_requests','update',this.brToDb(nb),nb.id); }
  persistPr(np){ this.setState(s=>({pr:s.pr.map(p=>p.id===np.id?np:p)})); this._save('purchase_requests','update',this.prToDb(np),np.id); }
  insertBr(nb){ this.setState(s=>({br:s.br.concat([nb])})); this._save('budget_requests','insert',this.brToDb(nb),nb.id); }
  insertPr(np){ this.setState(s=>({pr:s.pr.concat([np])})); this._save('purchase_requests','insert',this.prToDb(np),np.id); }
  // เขียนลง Supabase จริงเสมอ — ถ้าบันทึกไม่สำเร็จจะแจ้งเตือนชัดเจน (ไม่เก็บลงเครื่อง)
  async _save(table,op,row,id){ const sb=this.initDb();
    if(!sb || !this.state.online){ this.toastMsg('⚠ ยังไม่ได้เชื่อมต่อฐานข้อมูล — ข้อมูล "'+id+'" ยังไม่ถูกบันทึก กรุณาเชื่อมต่อแล้วลองใหม่'); return false; }
    try{ const q=op==='insert'? sb.from(table).insert(row) : sb.from(table).update(row).eq('id',id);
      const r=await q; if(r&&r.error){ console.warn(r.error); this.toastMsg('⚠ บันทึกข้อมูล "'+id+'" ลงฐานข้อมูลไม่สำเร็จ: '+(r.error.message||r.error.code||'')); return false; }
      return true;
    }catch(e){ console.warn(e); this.toastMsg('⚠ บันทึกข้อมูล "'+id+'" ลงฐานข้อมูลไม่สำเร็จ'); return false; } }

  brs(){ return (this.state.br||[]).filter(b=>this.inFy(b)); }
  allBr(){ return this.state.br||[]; }
  brById(id){ return (this.state.br||[]).find(b=>b.id===id); }
  // PR downstream status derived from linked SAP PO
  prs(){ return (this.state.pr||[]).filter(p=>this.inFy(p)).map(p=>{ let rec=Object.assign({},p); const poNo=rec.po||''; const po=this.prLinkedPo(poNo);
      if(poNo && po){ rec.gd=po.gd;rec.ap=po.ap;rec.paid=po.paid;rec.grl=po.grl||[];rec.vendor=rec.vendor||po.vn;rec.poVal=po.val;rec.poDeliv=po.deliv;rec.poPost=po.post;
        if(['ออกใบสั่งซื้อ','รับของแล้ว','ตั้งหนี้แล้ว','จ่ายเงินแล้ว'].includes(rec.status)){
          rec.status = po.paid>0?'จ่ายเงินแล้ว':po.ap>0?'ตั้งหนี้แล้ว':po.gd>0?'รับของแล้ว':'ออกใบสั่งซื้อ'; } }
      return rec; }); }
  prById(id){ return this.prs().find(p=>p.id===id); }
  recById(id){ return String(id).indexOf('BR-')===0? this.brById(id) : this.prById(id); }

  // ---------- QR camera scanner (jsQR) ----------
  componentDidUpdate(prevProps,prevState){ if(prevState && prevState.scanModal && !this.state.scanModal) this.stopScan(); }
  ensureJsQR(){ if(window.jsQR) return Promise.resolve(); if(this._jsqrP) return this._jsqrP;
    this._jsqrP=new Promise((res,rej)=>{ const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js'; s.onload=()=>res(); s.onerror=()=>rej(new Error('load')); document.head.appendChild(s); });
    return this._jsqrP; }
  async startScan(video){ if(!video || this._scanStream || this._scanStarting) return; this._scanStarting=true; this._scanVideo=video;
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});
      this._scanStream=stream; video.srcObject=stream; video.setAttribute('playsinline','true'); video.muted=true;
      await video.play().catch(()=>{});
      await this.ensureJsQR();
      this._scanCanvas=document.createElement('canvas');
      this._scanStarting=false;
      if(this.state.scanErr) this.setState({scanErr:false});
      this._scanLoop();
    }catch(e){ this._scanStarting=false; this.setState({scanErr:(e&&e.name==='NotAllowedError')?'denied':'nocam'}); }
  }
  _scanLoop(){ if(!this._scanStream) return; const v=this._scanVideo, c=this._scanCanvas;
    if(v && v.readyState===4 && window.jsQR && c){ try{
        c.width=v.videoWidth; c.height=v.videoHeight; const ctx=c.getContext('2d'); ctx.drawImage(v,0,0,c.width,c.height);
        const img=ctx.getImageData(0,0,c.width,c.height); const code=window.jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
        if(code && code.data){ this.onScanResult(code.data); return; }
      }catch(e){} }
    this._scanRAF=requestAnimationFrame(()=>this._scanLoop());
  }
  stopScan(){ if(this._scanRAF){ cancelAnimationFrame(this._scanRAF); this._scanRAF=null; }
    if(this._scanStream){ try{ this._scanStream.getTracks().forEach(t=>t.stop()); }catch(e){} this._scanStream=null; }
    if(this._scanVideo){ try{ this._scanVideo.srcObject=null; }catch(e){} this._scanVideo=null; }
    this._scanStarting=false; }
  onScanResult(raw){ const text=String(raw||'').trim(); if(!text) return;
    let id=text; const m=text.match(/(BR|PR)[-\s]?\d{6}[-\s]?\d+/i); if(m) id=m[0].replace(/\s/g,'').toUpperCase();
    const all=this.brs().concat(this.prs());
    let rec=this.recById(id) || all.find(r=>text.toUpperCase().indexOf(String(r.id).toUpperCase())>=0);
    if(rec){ this.stopScan(); this.setState({scanModal:false,scanErr:false,trackResult:rec.id,trackQ:rec.id,page:'tracking',drawer:false}); this.toastMsg&&this.toastMsg('พบเอกสาร '+rec.id); }
    else { const now=Date.now(); if(this._lastMiss&&now-this._lastMiss<1400 && this._lastMissText===text){ this._scanRAF=requestAnimationFrame(()=>this._scanLoop()); return; }
      this._lastMiss=now; this._lastMissText=text; this.setState({scanErr:'notfound'});
      this._scanRAF=requestAnimationFrame(()=>this._scanLoop()); }
  }
  myRequests(){ const me=this.role().user.name; return { brs:this.brs().filter(b=>b.requester===me), prs:this.prs().filter(p=>p.requester===me) }; }
  brCount(st){ return this.brs().filter(b=>b.status===st).length; }
  prCount(st){ return this.prs().filter(p=>p.status===st).length; }
  poolFor(dept,cat){ return this.D.pools.find(p=>p.dept===dept&&p.cat===cat)||this.D.pools.find(p=>p.cat===cat); }
  // งบจริงจาก SAP อ้างอิงด้วยเลขที่งบประมาณ (Budget Reserve No)
  sapCodes(){ return ((this.D.budgetSap&&this.D.budgetSap.codes)||[]).filter(c=>c.fy==null||c.fy===this.curFy()); }
  sapPlans(){ const seen={},out=[]; this.sapCodes().forEach(c=>{ if(c.plan&&!seen[c.plan]){seen[c.plan]=1;out.push(c.plan);} }); return out; }
  sapCodesForPlan(plan){ return this.sapCodes().filter(c=>c.plan===plan); }
  sapBudget(code){ return this.sapCodes().find(c=>c.exp===code)||null; }
  // งบคงเหลือของเลขงบ = Available จาก SAP หัก BR/PR ในระบบที่ผูกเลขงบเดียวกันแต่ยังไม่ตัดใน SAP
  budgetRemain(code){ const c=this.sapBudget(code); if(!c) return null; let used=0;
    this.brs().forEach(b=>{ if(b.budgetCode===code && ['จัดสรรงบแล้ว'].includes(b.status) && !b.prId) used+=b.value; });
    this.prs().forEach(p=>{ if(p.budgetCode===code && !p.po) used+=p.total; });
    return { avail:c.avail, current:c.current, pending:used, net:c.avail-used, code:c }; }
  // prog for unified timeline
  progOf(rec){ const m=this.statusMap(rec)||{}; return { prog:m.prog||0, reject:!!m.reject, c:m.c||this.MUTE, bg:m.bg||'#eef2f1' }; }

  // ================= ADMIN: USER MANAGEMENT =================
  defaultUsers(){ return [
    {username:'Admin',password:'Admin',name:'ผู้ดูแลระบบ',role:'admin',active:true},
    {username:'requester',password:'1234',name:'กมลวรรณ ศรีสุข',role:'requester',active:true},
    {username:'budget',password:'1234',name:'ดร.วรพล งบดี',role:'budget',active:true},
    {username:'procure',password:'1234',name:'ธนกร พงษ์ไพบูลย์',role:'procurement',active:true},
    {username:'finance',password:'1234',name:'สุภาพร เงินงาม',role:'finance',active:true},
    {username:'exec',password:'1234',name:'พญ.อรุณี วิสุทธิ์',role:'exec',active:true} ]; }
  async loadUsers(sb){ sb=sb||this._sb; if(!sb||!this.state.online){ this.setState({users:this.defaultUsers()}); return; }
    // โหมดใช้งานจริง: อ่านรายชื่อผู้ใช้จากตาราง profiles (Supabase Auth) — ไม่มีรหัสผ่าน
    if(this._authEmail){ try{ const r=await sb.from('profiles').select('email,name,role,active,dept,dept_name,pos,tel').order('email');
      if(!r.error && r.data){ this.setState({users:r.data.map(p=>({username:p.email,name:p.name,role:p.role,active:p.active!==false,dept:p.dept||'',deptName:p.dept_name||'',pos:p.pos||'',tel:p.tel||'',password:''}))}); return; } }catch(e){} }
    // โหมดสาธิต: ตาราง app_users เดิม
    try{ const r=await sb.from('app_users').select('*').order('username'); if(r.error){ this.setState({users:this.defaultUsers()}); return; }
      if((r.data||[]).length===0){ await sb.from('app_users').insert(this.defaultUsers()); const r2=await sb.from('app_users').select('*').order('username'); this.setState({users:(r2.data||this.defaultUsers())}); }
      else this.setState({users:r.data}); }catch(e){ this.setState({users:this.defaultUsers()}); } }
  saveUser(u){ this.setState(s=>{ const users=(s.users||[]).slice(); const i=users.findIndex(x=>x.username===u.username); if(i>=0)users[i]=u; else users.push(u); return {users}; });
    const sb=this._sb; if(sb&&this.state.online){
      if(this._authEmail){ sb.from('profiles').update({role:u.role,active:u.active!==false,name:u.name,dept:u.dept||null,dept_name:u.deptName||null,pos:u.pos||null,tel:u.tel||null}).eq('email',u.username).then(r=>{if(r&&r.error){console.warn(r.error);this.toastMsg('⚠ บันทึกไม่สำเร็จ: '+(r.error.message||''));}}); }
      else sb.from('app_users').upsert(u,{onConflict:'username'}).then(r=>{if(r&&r.error)console.warn(r.error);}); } }
  openEditUser(username){ const u=(this.state.users||[]).find(x=>x.username===username); if(u) this.setState({editUser:Object.assign({},u)}); }
  updEditUser(patch){ this.setState(s=>({editUser:Object.assign({},s.editUser,patch)})); }
  saveEditUser(){ const eu=this.state.editUser; if(!eu) return; this.saveUser(Object.assign({},eu)); this.setState({editUser:null}); this.toastMsg('บันทึกข้อมูลผู้ใช้ '+eu.username+' แล้ว'); }
  setUserRole(username,role){ const u=(this.state.users||[]).find(x=>x.username===username); if(u){ this.saveUser(Object.assign({},u,{role})); this.toastMsg('เปลี่ยนสิทธิ์ '+username+' → '+(this.ROLES.find(r=>r.k===role)||{}).label); } }
  toggleUser(username){ const u=(this.state.users||[]).find(x=>x.username===username); if(u){ this.saveUser(Object.assign({},u,{active:!(u.active!==false)})); } }
  delUser(username){ if(String(username).toLowerCase()==='admin'){ this.toastMsg('ลบบัญชีผู้ดูแลระบบไม่ได้'); return; }
    this.setState(s=>({users:(s.users||[]).filter(x=>x.username!==username)}));
    const sb=this._sb; if(sb&&this.state.online){ if(this._authEmail){ sb.from('profiles').update({active:false}).eq('email',username).then(r=>{if(r&&r.error)console.warn(r.error);}); } else sb.from('app_users').delete().eq('username',username).then(r=>{if(r&&r.error)console.warn(r.error);}); }
    this.toastMsg('ลบผู้ใช้ '+username+' แล้ว'); }
  addUser(){ const fm=this.state.userForm||{}; const un=(fm.username||'').trim(); if(!un||!fm.password){ this.toastMsg('กรอกชื่อผู้ใช้และรหัสผ่าน'); return; }
    if(this._authEmail){ this.toastMsg('โหมดใช้งานจริง: เพิ่มผู้ใช้ใหม่ที่ Supabase → Authentication → Add user แล้วกำหนดสิทธิ์ (role) ที่นี่'); return; }
    if((this.state.users||[]).some(x=>x.username.toLowerCase()===un.toLowerCase())){ this.toastMsg('มีชื่อผู้ใช้นี้อยู่แล้ว'); return; }
    this.saveUser({username:un,password:fm.password,name:fm.name||un,role:fm.role||'requester',active:true});
    this.setState({userForm:{username:'',password:'',name:'',role:'requester'}}); this.toastMsg('เพิ่มผู้ใช้ '+un+' แล้ว'); }
  async clearDemo(){ const sb=this._sb;
    if(sb&&this.state.online){ try{ await sb.from('purchase_requests').delete().neq('id',''); await sb.from('budget_requests').delete().neq('id',''); await sb.from('item_code_requests').delete().gte('id',0); }catch(e){ console.warn(e); } }
    this.setState({br:[],pr:[],icrRows:[]}); this.toastMsg('ล้างข้อมูลตัวอย่างทั้งหมดแล้ว — เริ่มคีย์ข้อมูลจริงได้เลย'); }

  onSapUpload(kind,file){ if(!file) return; const nm=file.name.length>28?file.name.slice(0,28)+'…':file.name;
    this.setState(s=>({uploads:Object.assign({},s.uploads,{[kind]:{name:nm,at:this.now(),status:'กำลังประมวลผล…'}})}));
    const num=v=>{ if(v==null||v==='')return 0; const n=parseFloat(String(v).replace(/,/g,'')); return isNaN(n)?0:n; };
    const dnum=s=>{ if(!s)return 0; const p=String(s).split('.'); if(p.length!==3)return 0; const d=+p[0],m=+p[1],y=+p[2]; return (2000+(y>100?y-543-2000+2000-2000:y))*10000+m*100+d; };
    const TODAY=20260710;
    const done=(msg,extra)=>{ this.setState(s=>({uploads:Object.assign({},s.uploads,{[kind]:{name:nm,at:this.now(),status:'สำเร็จ'}})},extra||{})); this.saveSapLocal(); this.toastMsg(msg); this.forceUpdate&&this.forceUpdate(); };
    if(!window.readXlsxFile){ this.toastMsg('ตัวอ่านไฟล์ยังไม่พร้อม — ลองใหม่อีกครั้ง'); return; }
    const dbNote=(db)=> !db? '' : (db.offline? ' · ⚠ โหมดสาธิต: ยังไม่ขึ้นฐานข้อมูล' : db.ok? (' · ✓ บันทึกฐานข้อมูล '+db.count+' รายการ') : (' · ✗ ฐานข้อมูลล้มเหลว: '+(db.err||'').slice(0,80)));
    window.readXlsxFile(file).then(async wbk=>{
      const sheets=wbk.sheets, first=wbk.order[0], rows=sheets[first]||[];
      if(kind==='budget'){
        // Summary sheet — อ่านหัวคอลัมน์อัตโนมัติ (รองรับไฟล์เก่า/ใหม่ที่คอลัมน์เลื่อน)
        const sh=sheets['Summary']||rows;
        let hi=-1; for(let i=0;i<Math.min(sh.length,12);i++){ const rr=(sh[i]||[]).map(x=>String(x||'').trim().toLowerCase()); if(rr.indexOf('level')>=0 && rr.some(c=>c.indexOf('expense code')>=0)){ hi=i; break; } }
        if(hi<0) hi=0;
        const H=(sh[hi]||[]).map(x=>String(x||'').trim().toLowerCase());
        const col=(...names)=>{ for(const nm of names){ let idx=H.indexOf(nm); if(idx>=0)return idx; idx=H.findIndex(c=>c.indexOf(nm)>=0); if(idx>=0)return idx; } return -1; };
        const cL=col('level'), cE=col('expense code'), cN=col('expense name'), cP=col('budget plan code','budget plan'), cS=col('budget subtype','budget sub'),
              cDC=col('department code'), cDN=col('department name'), cCur=col('current budget'), cCom=col('commit amount'), cAct=col('actual amount'), cAv=col('avaliable amount','available amount');
        // เลือก level ที่ลึกสุดที่มีเลขงบครบ (5=มีหน่วยงาน, สำรอง 4)
        const hasL5=sh.some((r,i)=>i>hi && String((r||[])[cL]||'').trim()==='5');
        const useLv=hasL5?'5':'4';
        const codeM={};
        for(let i=hi+1;i<sh.length;i++){ const r=sh[i]||[]; if(String(r[cL]||'').trim()!==useLv)continue; const exp=String(r[cE]||'').trim(); if(!exp)continue;
          const key=exp+'|'+String(r[cDC]||'');
          const e=codeM[key]||(codeM[key]={exp,name:String(r[cN]||'').trim(),plan:String(r[cP]||'').trim(),sub:String(r[cS]||'').trim(),current:0,commit:0,actual:0,avail:0,dept:String(r[cDN]||'').trim(),deptCode:String(r[cDC]||'').trim()});
          e.current+=num(r[cCur]); e.commit+=num(r[cCom]); e.actual+=num(r[cAct]); e.avail+=num(r[cAv]); }
        const codes=Object.values(codeM).map(c=>({exp:c.exp,fy:this.curFy(),name:c.name,plan:c.plan,sub:c.sub,current:Math.round(c.current),commit:Math.round(c.commit),actual:Math.round(c.actual),avail:Math.round(c.avail),dept:c.dept,deptCode:c.deptCode}));
        const tot=codes.reduce((a,c)=>({current:a.current+c.current,commit:a.commit+c.commit,actual:a.actual+c.actual,avail:a.avail+c.avail}),{current:0,commit:0,actual:0,avail:0});
        // คงรหัสงบปีก่อน (fy อื่น) + เติมงบปีที่นำเข้าใหม่ (fy = ปีงบที่เลือกอยู่)
        const keepOtherFy=(this.D.budgetSap&&this.D.budgetSap.codes||[]).filter(c=>c.fy!==this.curFy());
        const allCodes=keepOtherFy.concat(codes);
        this.D.budgetSap={generated:this.D.meta.today,codes:allCodes,totals:tot};
        // หมายเหตุ: ชีท BG_Detail_PO/BG_Detail_GR มีโครงสร้างคอลัมน์ต่างจากรายงาน PO/GR หลัก
        // จึงไม่ ingest อัตโนมัติ — ข้อมูล PO/GR ให้นำเข้าจากรายงาน PO/GR โดยตรงเท่านั้น
        this.persistBudgetSap(codes,tot).then(db=>this.dbToast('งบประมาณ',db));
        done('นำเข้ารายงานงบประมาณแล้ว — '+codes.length+' เลขงบ · กำลังบันทึกฐานข้อมูล…');
      } else if(kind==='po'){ const x=this.ingestPo(rows,num,dnum,TODAY); done('นำเข้า PO — เพิ่มใหม่ '+x.added+' · อัปเดต '+x.upd+' (รวม '+this.D.po.length+' ใบ) · กำลังบันทึกฐานข้อมูล…'); }
      else if(kind==='gr'){ const x=this.ingestGr(rows,num); done('นำเข้า GR แล้ว — '+x.n+' ใบตรวจรับ ('+x.lines+' รายการย่อย จับคู่เข้า PO) · กำลังบันทึกฐานข้อมูล…'); }
      else if(kind==='ap'){ const x=this.ingestAp(rows,num); done('นำเข้าใบตั้งหนี้ — เพิ่มใหม่ '+x.added+' · อัปเดต '+x.upd+' (รวม '+this.D.ap.length+' ใบ) · กำลังบันทึกฐานข้อมูล…'); }
      else if(kind==='pay'){ const x=this.ingestPay(rows,num); done('นำเข้าการจ่ายเงิน — เพิ่มใหม่ '+x.added+' · อัปเดต '+x.upd+' (รวม '+this.D.pay.length+' รายการ) · กำลังบันทึกฐานข้อมูล…'); }
      else done('นำเข้าไฟล์แล้ว');
    }).catch(err=>{ this.setState(s=>({uploads:Object.assign({},s.uploads,{[kind]:{name:nm,at:this.now(),status:'ผิดพลาด'}})})); this.toastMsg('อ่านไฟล์ไม่สำเร็จ: '+(err.message||err)); });
  }
  deptName(c){ return (this.D.deptNames&&this.D.deptNames[c])||('หน่วยงาน '+(c||'')); }
  async clearSap(){ if(!(typeof window!=='undefined'&&window.confirm&&window.confirm('ล้างข้อมูล SAP ทั้งหมด (PO/GR/AP/จ่าย/งบ) ทั้งในเครื่องและฐานข้อมูล?'))) return;
    this.D.po=[]; this.D.ap=[]; this.D.pay=[]; this.D.budgetSap={generated:this.D.meta.today,codes:[],totals:{current:0,commit:0,actual:0,avail:0}};
    this.setState({uploads:{}}); this.saveSapLocal();
    const sb=this._sb;
    if(sb&&this.state.online){ try{ for(const t of ['sap_po','sap_ap','sap_payment']) await sb.from(t).delete().neq('doc',''); await sb.from('sap_budget').delete().neq('exp',''); this.toastMsg('ล้างข้อมูล SAP ทั้งในเครื่องและฐานข้อมูลแล้ว'); }catch(e){ this.toastMsg('ล้างในเครื่องแล้ว — ฐานข้อมูล: '+((e&&e.message)||'ผิดพลาด')); } }
    else this.toastMsg('ล้างข้อมูล SAP ในเครื่องแล้ว (โหมดสาธิต)');
    this.forceUpdate&&this.forceUpdate(); }
  async persistBudgetSap(codes,tot){ const sb=this._sb; if(!sb||!this.state.online) return {ok:false,offline:true,count:0}; if(!codes||!codes.length) return {ok:true,count:0};
    try{ const payload=codes.map(c=>({exp:c.exp,fy:c.fy||this.curFy(),name:c.name,plan:c.plan,sub:c.sub,current:c.current,commit:c.commit,actual:c.actual,avail:c.avail,dept:c.dept,dept_code:c.deptCode}));
      const CH=500; let done=0; for(let i=0;i<payload.length;i+=CH){ const chunk=payload.slice(i,i+CH); const r=await sb.from('sap_budget').upsert(chunk,{onConflict:'exp,fy'}); if(r&&r.error){ console.warn('persistBudget',r.error); return {ok:false,count:done,err:(r.error.message||JSON.stringify(r.error))}; } done+=chunk.length; }
      return {ok:true,count:done};
    }catch(e){ console.warn('persistBudgetSap',e); return {ok:false,count:0,err:(e&&e.message)||String(e)}; } }
  dbToast(label,db){ if(!db)return; if(db.offline) this.toastMsg('⚠ '+label+': บันทึกในเครื่องแล้ว (ยังไม่ขึ้นฐานข้อมูล — โหมดสาธิต)'); else if(db.ok) this.toastMsg('✓ '+label+' บันทึกฐานข้อมูลแล้ว '+db.count+' รายการ'); else this.toastMsg('✗ '+label+' บันทึกฐานข้อมูลไม่สำเร็จ: '+(db.err||'').slice(0,90)); this.forceUpdate&&this.forceUpdate(); }
  ingestPo(rows,num,dnum,TODAY){ const m={}; for(let i=1;i<rows.length;i++){ const r=rows[i]; const doc=r[3]; if(!doc)continue;
      let o=m[doc]; if(!o){ o=m[doc]={doc,pf:r[2]||'',post:r[6]||'',deliv:r[8]||'',vc:r[9]||'',vn:r[10]||'',dept:r[30]||'',who:((r[36]||'')+' '+(r[37]||'')).trim(),exp:r[46]||'',val:0,qty:0,open:0,ln:0}; }
      o.val+=num(r[26]); o.qty+=num(r[17]); o.open+=num(r[18]); o.ln++; }
    const arr=Object.values(m).map(o=>{ o.tr=o.open<=0.01?'full':(o.open>=o.qty-0.01?'await':'partial'); o.dn=this.deptName(o.dept); o.val=Math.round(o.val); o.gd=0; o.ap=0; o.paid=0; o.grl=[];
      const dd=dnum?dnum(o.deliv):0; o.od=(o.tr!=='full'&&dd&&dd<TODAY)?1:0; o.odDays=0; return o; });
    const merged=this.mergeByKey(this.D.po,arr,'doc'); this.D.po=merged.list; this.saveSapLocal(); this.persistSap('sap_po',arr).then(db=>this.dbToast('PO',db)); return {n:arr.length,added:merged.added,upd:merged.upd}; }
  ingestGr(rows,num){ const byPo={}; const seenDoc={}; let lines=0, docs=0; for(let i=1;i<rows.length;i++){ const r=rows[i]; const doc=r[3]; if(!doc)continue; lines++; const base=r[34]||''; const g=(byPo[base]=byPo[base]||{docs:[],seen:{},val:0}); g.val+=Math.round(num(r[26])); if(!g.seen[doc]){ g.seen[doc]=true; g.docs.push({d:doc,date:r[6]||'',val:Math.round(num(r[26]))}); if(!seenDoc[doc]){ seenDoc[doc]=true; docs++; } } }
    (this.D.po||[]).forEach(p=>{ const g=byPo[p.doc]; if(g){ p.gd=g.docs.length; p.grl=g.docs.slice(0,6); } }); this.saveSapLocal(); this.persistSap('sap_po',this.D.po).then(db=>this.dbToast('GR',db)); return {n:docs,added:docs,upd:0,lines:lines}; }
  ingestAp(rows,num){ const m={}; for(let i=1;i<rows.length;i++){ const r=rows[i]; const doc=r[3]; if(!doc)continue;
      let o=m[doc]; if(!o){ o=m[doc]={doc,post:r[5]||'',vc:r[8]||'',vn:r[9]||'',dept:r[31]||'',base:r[37]||'',exp:r[47]||'',val:0,paid:false,payDate:'',payDoc:'',method:''}; } o.val+=num(r[25]); }
    const arr=Object.values(m).map(o=>{ o.val=Math.round(o.val); o.dn=this.deptName(o.dept); return o; }); const merged=this.mergeByKey(this.D.ap,arr,'doc'); this.D.ap=merged.list; this.linkApToPo(); this.linkPayToAp(); this.saveSapLocal(); this.persistSap('sap_ap',arr).then(db=>this.dbToast('ใบตั้งหนี้',db)); return {n:arr.length,added:merged.added,upd:merged.upd}; }
  ingestPay(rows,num){ const m={}; const paidInv=Object.assign({},this.D.paidInv||{}); for(let i=1;i<rows.length;i++){ const r=rows[i]; const doc=r[4]; if(!doc)continue;
